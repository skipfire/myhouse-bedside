# Example: merge into your device YAML. Adjust status_url and Wi-Fi as needed.
esphome:
  name: bedside-panel
  friendly_name: Bedside panel
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    advanced:
      include_builtin_idf_components:
        - esp_http_client

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

time:
  - platform: homeassistant
    id: ha_time

# For a clone of myhouse-bedside next to your YAML, use type: local path: ../myhouse-bedside/components
external_components:
  - source:
      type: git
      url: https://github.com/skipfire/myhouse-bedside
      ref: main    
    components: [bedside_status]
    refresh: 0s

bedside_status:
  id: bedside
  sck_pin: GPIO12
  mosi_pin: GPIO11
  rst_pin: GPIO47
  dc_pin: GPIO46
  cs_pin: GPIO45
  busy_pin: GPIO48
  screen_power_pin: GPIO7
  status_url: "https://example.com/MyHouse/Status/minimal"
  verify_ssl: true
  footer_ip_left: true
  display_status_filter: 3
  # Each pass runs EPD_Display + EPD_PartUpdate (~1.5s BUSY each). Default 3 helps contrast;
  # use 1 for faster refresh (expect softer partial ink). Key is epd_partial_passes (not display_*).
  epd_partial_passes: 3
  time_id: ha_time
  update_interval: 5s
